# Dogfood our own templates instead of inline copies.
include:
  - local: /templates/release.yml
  - local: /templates/sync-github.yml

stages:
  - lint
  - test
  - release
  - sync

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

ci-lint:
  stage: lint
  image: alpine:3
  tags:
    - self-hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - apk add --no-cache yamllint
    - yamllint -d relaxed templates/ manifest.yml lock.yml .gitlab-ci.yml

lock-check:
  stage: lint
  image: ruby:3.3-alpine
  tags:
    - self-hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apk add --no-cache git curl
    - curl -sL https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz | tar -xz -C /usr/local/bin crane
    - gem install "$STACK_SPECIFIC_INSTALL_GEM" -v "$STACK_SPECIFIC_INSTALL_VERSION" --no-document
    - gem specific_install "$STACK_AUTOMATION_REPO" -b "$STACK_AUTOMATION_SHA"
  script:
    - eiseron ci check

template-test:
  stage: test
  image: alpine:3
  tags:
    - self-hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - for t in test/*_test.sh; do echo "== $t =="; sh "$t"; done
