# Dogfood our own mirror template instead of an inline copy.
include:
  - local: /templates/sync-github.yml

stages:
  - lint
  - sync

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

ci-lint:
  stage: lint
  image: alpine:3
  tags:
    - self-hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - apk add --no-cache yamllint
    - yamllint -d relaxed templates/ .gitlab-ci.yml
