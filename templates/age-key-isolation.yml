spec:
  inputs:
    stage:
      default: "lint"
      description: "Pipeline stage for the job (consumer must declare it)."
---

age-key-isolation:
  stage: $[[ inputs.stage ]]
  timeout: 2 minutes
  before_script: []
  script:
    - '[ -z "${AGE_KEY:-}" ] || { echo "AGE_KEY present in an MR pipeline: it must be production-scoped and protected"; exit 1; }'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
