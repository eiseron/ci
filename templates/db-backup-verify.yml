spec:
  inputs:
    app_name:
      default: "app"
      description: "Product slug; selects the backup object prefix (PROD_BACKUP_NAME)."
    verify_stage:
      default: "verify"
      description: "Pipeline stage for the verify job (the consumer must declare it)."
---
include:
  - local: /lock.yml
  - local: /templates/notify-telegram.yml

db-backup-verify:
  extends: .notify_telegram_on_failure
  stage: $[[ inputs.verify_stage ]]
  timeout: 5 minutes
  image:
    name: $STACK_GEM_RUNTIME_IMAGE
  tags:
    - self-hosted
  environment:
    name: production
  cache: []
  variables:
    GIT_STRATEGY: none
    PROD_BACKUP_NAME: "$[[ inputs.app_name ]]"
  before_script:
    - export AWS_ACCESS_KEY_ID="$PROD_DRILL_AWS_ACCESS_KEY_ID"
    - export AWS_SECRET_ACCESS_KEY="$PROD_DRILL_AWS_SECRET_ACCESS_KEY"
    - gem install specific_install -v "$STACK_SPECIFIC_INSTALL_VERSION" --no-document
    - gem specific_install "$STACK_AUTOMATION_REPO" -b "$STACK_AUTOMATION_SHA"
    - export PATH="$(ruby -e 'print Gem.user_dir')/bin:$PATH"
  script:
    - eiseron db backup verify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $BACKUP_JOB == "verify"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $BACKUP_JOB == "verify"'
