spec:
  inputs:
    chdir:
      default: "."
      description: "Directory of the Terraform root module to check."
    image_tag:
      default: "v0.1.13"
      description: "public-image-bases terraform-tools tag to run the job on."
    stage:
      default: "drift"
      description: "Pipeline stage for the job (consumer must declare it after apply, so the main-branch run asserts convergence)."
    secrets_file:
      default: "secrets.readwrite.enc.env"
      description: "SOPS-encrypted env file decrypted into the job environment."
    environment:
      default: "production"
      description: "Environment whose protected variables (AGE_KEY) the job receives."
---
terraform-drift:
  stage: $[[ inputs.stage ]]
  image:
    name: registry.gitlab.com/eiseron/stack/public-image-bases/terraform-tools:$[[ inputs.image_tag ]]
    entrypoint: [""]
  tags:
    - self-hosted
  cache: []
  timeout: 15 minutes
  environment:
    name: $[[ inputs.environment ]]
    action: prepare
  variables:
    SECRETS_FILE: $[[ inputs.secrets_file ]]
  before_script:
    - eval "$(SOPS_AGE_KEY="$AGE_KEY" sops --output-type json -d "$SECRETS_FILE" | jq -r 'to_entries[] | "export \(.key)=\(.value | @sh)"')"
    - terraform -chdir="$[[ inputs.chdir ]]" init -input=false
  script:
    - |
      terraform -chdir="$[[ inputs.chdir ]]" plan -detailed-exitcode -input=false -lock=false || {
        code=$?
        if [ "$code" -eq 2 ]; then
          echo "DRIFT: state differs from configuration. Apply the pending changes (did a SOPS edit miss its apply?)"
        fi
        exit "$code"
      }
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $DRIFT_CHECK == "1"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "trigger"
