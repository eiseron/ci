spec:
  inputs:
    app_name:
      default: "app"
      description: "Product slug; deployed previews are matched as <app_name>-mr-<iid><preview_suffix>."
    preview_suffix:
      default: ""
      description: "Suffix used by the deploy template (e.g. -preview); must match it."
    scan_project:
      description: "URL-path of the product project whose still-open MRs are kept (e.g. group/holter/holter)."
    sweep_stage:
      default: "sweep"
      description: "Pipeline stage for the sweep job (the consumer must declare it)."
---
include:
  - local: /lock.yml

preview-sweep:
  image:
    name: $STACK_PYTHON_ANSIBLE_IMAGE
  tags:
    - self-hosted
  cache: []
  stage: $[[ inputs.sweep_stage ]]
  environment:
    name: production
  variables:
    GIT_STRATEGY: none
    ANSIBLE_HOST_KEY_CHECKING: "False"
    ANSIBLE_PRIVATE_KEY_FILE: "$CI_PROJECT_DIR/preview_key"
    EISERON_PREVIEW_APP: "$[[ inputs.app_name ]]"
    EISERON_PREVIEW_SUFFIX: "$[[ inputs.preview_suffix ]]"
    EISERON_PREVIEW_SCAN_PROJECT: "$[[ inputs.scan_project ]]"
  before_script:
    - install -d -m 700 "$CI_PROJECT_DIR"
    - cp "$PREVIEW_ANSIBLE_SSH_PRIVATE_KEY" "$CI_PROJECT_DIR/preview_key"
    - chmod 600 "$CI_PROJECT_DIR/preview_key"
    - gem install specific_install -v "$STACK_SPECIFIC_INSTALL_VERSION" --no-document
    - gem specific_install "$STACK_AUTOMATION_REPO" -b "$STACK_AUTOMATION_SHA"
    - ansible-galaxy collection install "git+$STACK_PROVISIONING_REPO,$STACK_PROVISIONING_SHA" --force
  script:
    - eiseron preview sweep
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
