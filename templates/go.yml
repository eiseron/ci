spec:
  inputs:
    go_image:
      default: "golang:1.25"
      description: "Image used for the build and test jobs."
    golangci_image:
      default: "golangci/golangci-lint:v2.5.0-alpine"
      description: "Image providing golangci-lint and the Go toolchain for the lint job."
---
stages:
  - lint
  - test

.go-vars: &go-vars
  GOTOOLCHAIN: local
  GOFLAGS: -buildvcs=false
  GOMODCACHE: $CI_PROJECT_DIR/.cache/go-mod
  GOCACHE: $CI_PROJECT_DIR/.cache/go-build
  GOLANGCI_LINT_CACHE: $CI_PROJECT_DIR/.cache/golangci

.go-cache: &go-cache
  key:
    files:
      - go.sum
  paths:
    - .cache/

lint:
  stage: lint
  image: $[[ inputs.golangci_image ]]
  tags:
    - self-hosted
  variables:
    <<: *go-vars
  cache:
    - *go-cache
  script:
    - |
      unformatted=$(gofmt -l . | grep -v '^.cache/' || true)
      if [ -n "$unformatted" ]; then
        echo "$unformatted"
        echo 'gofmt needed on the files above'
        exit 1
      fi
    - go vet ./...
    - golangci-lint run ./...
    - |
      line_comments=$(find . -path ./.cache -prune -o -name '*.go' -exec grep -nHE '(^|[^:])//' {} + | grep -vE '//go:' || true)
      if [ -n "$line_comments" ]; then
        echo "$line_comments"
        echo 'line comments are not allowed in source; move rationale to the MR description'
        exit 1
      fi
    - |
      block_comments=$(find . -path ./.cache -prune -o -name '*.go' -exec grep -nH '/[*]' {} + || true)
      if [ -n "$block_comments" ]; then
        echo "$block_comments"
        echo 'block comments are not allowed in source'
        exit 1
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:
  stage: test
  image: $[[ inputs.go_image ]]
  tags:
    - self-hosted
  variables:
    <<: *go-vars
  cache:
    - *go-cache
  script:
    - go test ./... -race
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
