spec:
  inputs:
    image_tag:
      default: "v0.1.15"
      description: "public-image-bases ops image tag (kamal + docker + ssh + ruby + git)."
    automation_ref:
      default: "v0.15.1"
      description: "eiseron/stack/automation tag providing `eiseron prod backup`."
    provisioning_ref:
      default: "v0.49.0"
      description: "eiseron/stack/provisioning tag carrying the canonical kamal/app manifest with the backup accessory."
    app_service:
      description: "kamal service name, consumed by the manifest as APP_SERVICE."
    app_image:
      description: "Image repository path, consumed by the manifest as APP_IMAGE."
    app_host:
      description: "Public app host, consumed by the manifest as APP_HOST."
    app_port:
      default: "4000"
      description: "Container port the app listens on (APP_PORT)."
    app_release_module:
      description: "Elixir release module, consumed by the manifest as APP_RELEASE_MODULE."
    tenant_slug:
      description: "Per-product Postgres role/slug (PROD_TENANT_SLUG); the backup connects as this role."
    db_url_scheme:
      default: "ecto"
      description: "Scheme for the assembled DATABASE_URL (DB_URL_SCHEME)."
    backup_stage:
      default: "backup"
      description: "Pipeline stage for the backup job (the consumer must declare it)."
---
prod-backup:
  stage: $[[ inputs.backup_stage ]]
  needs: []
  image:
    name: registry.gitlab.com/eiseron/stack/public-image-bases/ops:$[[ inputs.image_tag ]]
  tags:
    - self-hosted
  environment:
    name: production
  resource_group: production
  variables:
    GIT_STRATEGY: none
    APP_SERVICE: "$[[ inputs.app_service ]]"
    APP_IMAGE: "$[[ inputs.app_image ]]"
    APP_HOST: "$[[ inputs.app_host ]]"
    APP_PORT: "$[[ inputs.app_port ]]"
    APP_RELEASE_MODULE: "$[[ inputs.app_release_module ]]"
    PROD_TENANT_SLUG: "$[[ inputs.tenant_slug ]]"
    DB_URL_SCHEME: "$[[ inputs.db_url_scheme ]]"
  before_script:
    - gem install specific_install --no-document
    - gem specific_install https://gitlab.com/eiseron/stack/automation.git -b "$[[ inputs.automation_ref ]]"
    - export PATH="$(ruby -e 'print Gem.user_dir')/bin:$PATH"
    - git clone --depth 1 --branch "$[[ inputs.provisioning_ref ]]" https://gitlab.com/eiseron/stack/provisioning.git /tmp/provisioning
    - cp -r /tmp/provisioning/kamal/app/. .
    - eval "$(ssh-agent -s)"
    - install -d -m 700 ~/.ssh
    - install -m 600 "$PROD_SSH_PRIVATE_KEY" ~/.ssh/prod_deploy_key
    - ssh-add ~/.ssh/prod_deploy_key
    - printf 'Host *\n  StrictHostKeyChecking accept-new\n' > ~/.ssh/config
  script:
    - eiseron prod backup
  rules:
    - if: $CI_COMMIT_BRANCH == "production"
      when: manual
