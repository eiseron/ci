spec:
  inputs:
    app_name:
      default: "app"
      description: "Product slug; selects the backup object prefix (PROD_BACKUP_NAME)."
    drill_stage:
      default: "drill"
      description: "Pipeline stage for the drill job (the consumer must declare it)."
---
include:
  - local: /lock.yml
  - local: /templates/notify-telegram.yml

db-restore-drill:
  extends: .notify_telegram_on_failure
  stage: $[[ inputs.drill_stage ]]
  timeout: 15 minutes
  image:
    name: $STACK_GEM_RUNTIME_IMAGE
  tags:
    - self-hosted
  environment:
    name: production
  cache: []
  services:
    - name: $STACK_POSTGRES_IMAGE
      alias: postgres
  variables:
    GIT_STRATEGY: none
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: drill
    PGHOST: postgres
    PGUSER: postgres
    PGPASSWORD: postgres
    PROD_DRILL_DATABASE: drill
    PROD_BACKUP_NAME: "$[[ inputs.app_name ]]"
  before_script:
    - export AWS_ACCESS_KEY_ID="$PROD_DRILL_AWS_ACCESS_KEY_ID"
    - export AWS_SECRET_ACCESS_KEY="$PROD_DRILL_AWS_SECRET_ACCESS_KEY"
    - n=0; until pg_isready -h postgres -U postgres -t 1; do n=$((n+1)); [ "$n" -ge 30 ] && { echo "postgres service did not become ready after 30 attempts"; exit 1; }; sleep 1; done
  script:
    - eiseron db restore-drill
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $BACKUP_JOB == "drill"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $BACKUP_JOB == "drill"'
