spec:
  inputs:
    image_tag:
      default: "v0.1.15"
      description: "public-image-bases ops image tag (kamal + docker + ssh + ruby + git)."
    provisioning_ref:
      default: "v0.37.0"
      description: "eiseron/stack/provisioning tag carrying the canonical kamal/platform manifest."
    platform_stage:
      default: "platform"
      description: "Pipeline stage for the platform job (the consumer must declare it)."
---
prod-platform:
  stage: $[[ inputs.platform_stage ]]
  needs: []
  image:
    name: registry.gitlab.com/eiseron/stack/public-image-bases/ops:$[[ inputs.image_tag ]]
  tags:
    - self-hosted
  environment:
    name: production
  resource_group: production
  variables:
    GIT_STRATEGY: none
  before_script:
    - git clone --depth 1 --branch "$[[ inputs.provisioning_ref ]]" https://gitlab.com/eiseron/stack/provisioning.git /tmp/provisioning
    - cp -r /tmp/provisioning/kamal/platform/. .
    - eval "$(ssh-agent -s)"
    - install -d -m 700 ~/.ssh
    - install -m 600 "$PROD_SSH_PRIVATE_KEY" ~/.ssh/prod_deploy_key
    - ssh-add ~/.ssh/prod_deploy_key
    - printf 'Host *\n  StrictHostKeyChecking accept-new\n' > ~/.ssh/config
  script:
    - kamal accessory boot db --version="$CI_COMMIT_SHORT_SHA"
    - kamal proxy boot --version="$CI_COMMIT_SHORT_SHA"
  rules:
    - if: $CI_COMMIT_BRANCH == "production" && $CI_PIPELINE_SOURCE != "schedule"
      when: manual
