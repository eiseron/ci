spec:
  inputs:
    app_name:
      default: "app"
      description: "OTP app name; the template derives the test database as <app_name>_test."
    test_script:
      default: "mix coveralls.html"
      description: "Command to run the test suite with ExCoveralls coverage. Defaults to 'mix coveralls.html' which prints the text summary (matched by the coverage regex) and writes HTML reports to cover/. Override with a custom alias when the project uses a non-default coveralls task."
---
include:
  - local: /lock.yml

stages:
  - lint
  - test

.eiseron-phoenix-cache: &eiseron_phoenix_cache
  key:
    files:
      - mix.lock
  paths:
    - deps/
    - _build/

lint:
  stage: lint
  image: $STACK_ELIXIR_BUILDER_IMAGE
  tags:
    - self-hosted
  cache:
    - *eiseron_phoenix_cache
  variables:
    MIX_ENV: dev
  before_script:
    - mix deps.get
  script:
    - mix format --check-formatted
    - mix compile --warnings-as-errors
    - mix credo --strict
    - mix deps.audit
    - mix sobelow --exit
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:
  stage: test
  image: $STACK_ELIXIR_BUILDER_IMAGE
  tags:
    - self-hosted
  services:
    - name: $STACK_POSTGRES_IMAGE
      alias: postgres
  variables:
    MIX_ENV: test
    DB_HOST: postgres
    DB_USER: postgres
    DB_PASS: postgres
    DB_NAME: $[[ inputs.app_name ]]_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
  cache:
    - *eiseron_phoenix_cache
  before_script:
    - mix deps.get
    - until pg_isready -h postgres -U postgres -t 1; do sleep 1; done
  coverage: '/\s+(\d+\.\d+)% \| Total/'
  artifacts:
    paths:
      - cover/
    expire_in: 7 days
    when: always
  script:
    - mix ecto.create
    - mix ecto.migrate
    - $[[ inputs.test_script ]]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
