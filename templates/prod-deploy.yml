spec:
  inputs:
    app_service:
      default: "$PROD_SLUG"
      description: "Service name, consumed by the manifest as APP_SERVICE. Defaults to PROD_SLUG, published by product_instance."
    app_image:
      description: "Image repository path, consumed by the manifest as APP_IMAGE and PROD_IMAGE."
    app_host:
      description: "Public app host, consumed by the manifest as APP_HOST."
    app_port:
      default: "4000"
      description: "Container port the app listens on (APP_PORT)."
    app_release_module:
      description: "Elixir release module for the post-deploy migrate hook (APP_RELEASE_MODULE)."
    migrate_cmd:
      default: "bin/migrate"
      description: "Container migrate command (PROD_MIGRATE_CMD)."
    tenant_slug:
      description: "Per-product Postgres role/slug (PROD_TENANT_SLUG); the managed PROD_TENANT_PASSWORD is re-applied idempotently each deploy."
    db_url_scheme:
      default: "ecto"
      description: "Scheme for the assembled DATABASE_URL (DB_URL_SCHEME)."
    deploy_stage:
      default: "deploy"
      description: "Pipeline stage for the deploy job (the consumer must declare it)."
---
include:
  - local: /lock.yml
  - local: /templates/notify-telegram.yml

prod-deploy:
  extends: .notify_telegram_on_failure
  stage: $[[ inputs.deploy_stage ]]
  needs: []
  image:
    name: $STACK_OPS_IMAGE
  tags:
    - self-hosted
  environment:
    name: production
  resource_group: production
  variables:
    GIT_STRATEGY: none
    APP_SERVICE: "$[[ inputs.app_service ]]"
    APP_IMAGE: "$[[ inputs.app_image ]]"
    APP_HOST: "$[[ inputs.app_host ]]"
    APP_PORT: "$[[ inputs.app_port ]]"
    APP_RELEASE_MODULE: "$[[ inputs.app_release_module ]]"
    PROD_IMAGE: "$[[ inputs.app_image ]]"
    PROD_MIGRATE_CMD: "$[[ inputs.migrate_cmd ]]"
    PROD_TENANT_SLUG: "$[[ inputs.tenant_slug ]]"
    DB_URL_SCHEME: "$[[ inputs.db_url_scheme ]]"
  before_script:
    - gem install specific_install -v "$STACK_SPECIFIC_INSTALL_VERSION" --no-document
    - gem specific_install "$STACK_AUTOMATION_REPO" -b "$STACK_AUTOMATION_SHA"
    - export PATH="$(ruby -e 'print Gem.user_dir')/bin:$PATH"
    - install -d -m 700 ~/.kube
    - export KUBECONFIG="$HOME/.kube/config"
    - printf '%s' "$PROD_KUBE_CA" | base64 -d > ~/.kube/ca.crt
    - kubectl config set-cluster prod --server="$PROD_KUBE_HOST" --certificate-authority="$HOME/.kube/ca.crt" --embed-certs=true
    - kubectl config set-credentials prod --token="$PROD_KUBE_TOKEN"
    - kubectl config set-context prod --cluster=prod --user=prod
    - kubectl config use-context prod
  script:
    - eiseron prod deploy
  rules:
    - if: '$PROD_TAG && $PROD_ACTION == "deploy"'
      variables:
        PROD_DEPLOY_ALLOW_OLD: ""
    - if: $CI_PIPELINE_SOURCE == "web" && $PROD_TAG
      when: manual
