spec:
  inputs:
    chdirs:
      type: array
      description: "Directories of the Terraform/OpenTofu modules/configs to validate, one job per entry."
    stage:
      default: "validate"
      description: "Pipeline stage for the job (consumer must declare it)."
---
include:
  - local: /lock.yml

terraform-validate:
  stage: $[[ inputs.stage ]]
  image:
    name: $STACK_IAC_IMAGE
    entrypoint: [""]
  tags:
    - self-hosted
  cache: []
  parallel:
    matrix:
      - CHDIR: $[[ inputs.chdirs ]]
  script:
    - tofu -chdir="$CHDIR" init -backend=false -input=false
    - tofu -chdir="$CHDIR" fmt -check -recursive
    - tofu -chdir="$CHDIR" validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
