spec:
  inputs:
    chdir:
      default: "."
      description: "Directory of the Terraform module/config to validate."
    name:
      default: ""
      description: "Suffix for the job name so the template can be included once per module (e.g. -product)."
    stage:
      default: "validate"
      description: "Pipeline stage for the job (consumer must declare it)."
---
include:
  - local: /lock.yml

terraform-validate$[[ inputs.name ]]:
  stage: $[[ inputs.stage ]]
  image:
    name: $STACK_IAC_IMAGE
    entrypoint: [""]
  tags:
    - self-hosted
  cache: []
  script:
    - tofu -chdir="$[[ inputs.chdir ]]" init -backend=false -input=false
    - tofu -chdir="$[[ inputs.chdir ]]" fmt -check -recursive
    - tofu -chdir="$[[ inputs.chdir ]]" validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
