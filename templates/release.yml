spec:
  inputs:
    version_file:
      default: VERSION
      description: File holding the bare semver string (no leading 'v').
---
include:
  - local: /lock.yml


# Version-driven release tagging.
#
# The tagging logic lives in the eiseron_automation gem (eiseron/stack/
# automation), installed here from a pinned git tag. When the version file
# changes on a protected ref (main / release/*), `eiseron release tag` reads
# the version and creates v<version> from the reviewed commit via the GitLab
# API, using RELEASE_TOKEN (a CI/CD variable provisioned per consumer with a
# token that has Developer+ on the repo). A tag therefore always maps to a
# reviewed MR that changed the version file.
#
# Usage in a consumer .gitlab-ci.yml:
#   include:
#     - project: eiseron/stack/ci
#       file: /templates/release.yml
#       ref: v0.1.1
#   stages: [release]

release-tag:
  stage: release
  image: $STACK_RUBY_IMAGE
  tags:
    - self-hosted
  cache: []
  variables:
    VERSION_FILE: $[[ inputs.version_file ]]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - $[[ inputs.version_file ]]
    - if: $CI_COMMIT_BRANCH =~ /^release\//
      changes:
        - $[[ inputs.version_file ]]
  before_script:
    - apk add --no-cache git
    - gem install specific_install -v "$STACK_SPECIFIC_INSTALL_VERSION" --no-document
    - gem specific_install "$STACK_AUTOMATION_REPO" -b "$STACK_AUTOMATION_SHA"
  script:
    - eiseron release tag
