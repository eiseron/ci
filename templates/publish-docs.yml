# Versioned docs publishing.
#
# On a semver tag, installs the eiseron_automation gem from a pinned ref and
# runs `eiseron docs publish`, which clones the docs site, refreshes the latest
# docs (preserving frozen version snapshots), freezes a v<MAJOR.MINOR> snapshot,
# updates versions.json, and commits/pushes to the site. The product authors
# docs in its own repo; a tag ships them to the site.
#
# Requires a GITLAB_TOKEN CI variable with write access to the site repo
# (declare it as a group/project variable via Terraform).
#
# Usage in a consumer .gitlab-ci.yml:
#   include:
#     - project: eiseron/stack/ci
#       file: /templates/publish-docs.yml
#       ref: v0.1.10
#       inputs:
#         site_repo: eiseron/afinados/afinados-site
#         locale_map: '{"pt_BR":"src/docs","en":"src/en/docs"}'
#   stages: [publish]

spec:
  inputs:
    site_repo:
      description: "Full path of the docs site repo, e.g. eiseron/group/site."
    locale_map:
      description: "JSON object mapping a source locale dir to a site dest dir."
    source_dir:
      default: "docs"
      description: "Directory in the product repo holding the locale doc dirs."
    versions_file:
      default: "versions.json"
      description: "Path of the versions manifest in the site repo."
    site_branch:
      default: "main"
      description: "Branch of the site repo to push to."
    stage:
      default: "publish"
      description: "Pipeline stage for the job."
---
include:
  - local: /lock.yml


publish-docs:
  stage: $[[ inputs.stage ]]
  image: $STACK_RUBY_IMAGE
  cache: []
  variables:
    DOCS_SITE_REPO: "$[[ inputs.site_repo ]]"
    DOCS_LOCALE_MAP: "$[[ inputs.locale_map ]]"
    DOCS_SOURCE_DIR: "$[[ inputs.source_dir ]]"
    DOCS_VERSIONS_FILE: "$[[ inputs.versions_file ]]"
    DOCS_SITE_BRANCH: "$[[ inputs.site_branch ]]"
  rules:
    - if: $GITLAB_TOKEN == null || $GITLAB_TOKEN == ""
      when: never
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  before_script:
    - apk add --no-cache git
    - gem install specific_install -v "$STACK_SPECIFIC_INSTALL_VERSION" --no-document
    - gem specific_install "$STACK_AUTOMATION_REPO" -b "$STACK_AUTOMATION_SHA"
  script:
    - eiseron docs publish
