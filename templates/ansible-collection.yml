spec:
  inputs:
    playbook:
      default: ""
      description: "Optional playbook to syntax-check after installing the built collection. Empty skips the check."
    name:
      default: ""
      description: "Optional job-name suffix so multiple includes (one per playbook) don't collide."
    stage:
      default: "validate"
      description: "Pipeline stage for the job (consumer must declare it)."
---
include:
  - local: /lock.yml

ansible-collection$[[ inputs.name ]]:
  stage: $[[ inputs.stage ]]
  image:
    name: $STACK_PYTHON_ANSIBLE_IMAGE
  tags:
    - self-hosted
  cache: []
  script:
    - ansible-galaxy collection build --output-path build/ --force
    - ansible-galaxy collection install build/*.tar.gz
    - PLAYBOOK="$[[ inputs.playbook ]]"; if [ -n "$PLAYBOOK" ]; then ansible-playbook --syntax-check "$PLAYBOOK"; fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
