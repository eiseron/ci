spec:
  inputs:
    chdir:
      default: "."
      description: "Directory tree scanned for .tf files."
    stage:
      default: "lint"
      description: "Pipeline stage for the job (consumer must declare it)."
---
include:
  - local: /lock.yml

tofu-lint:
  stage: $[[ inputs.stage ]]
  image:
    name: $STACK_IAC_IMAGE
    entrypoint: [""]
  tags:
    - self-hosted
  cache: []
  before_script: []
  script:
    - cd "$[[ inputs.chdir ]]"
    - eiseron tofu lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME != "production"
      changes:
        - "**/*.tf"
