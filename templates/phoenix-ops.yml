spec:
  inputs:
    chdir:
      default: "."
      description: "Directory of the Terraform root module."
    secrets_file:
      default: "secrets.enc.env"
      description: "SOPS-encrypted env file decrypted into the job environment."
    app_name:
      default: "$PROD_SLUG"
      description: "Product slug; the restore drill's backup object prefix (PROD_BACKUP_NAME). Defaults to PROD_SLUG, published by product_instance."
    app_service:
      default: "$PROD_SLUG"
      description: "Service name (APP_SERVICE). Defaults to PROD_SLUG, published by product_instance."
    app_image:
      description: "Image repository path (APP_IMAGE)."
    app_host:
      default: "$PROD_APP_HOST"
      description: "Public app host (APP_HOST). Defaults to PROD_APP_HOST, published by product_instance; override only for products not on that module."
    app_port:
      default: "4000"
      description: "Container port the app listens on (APP_PORT)."
    app_release_module:
      default: "$PROD_RELEASE_MODULE"
      description: "Elixir release module for the post-deploy migrate hook (APP_RELEASE_MODULE.Release.migrate). Defaults to PROD_RELEASE_MODULE, published by product_instance."
    tenant_slug:
      default: "$PROD_SLUG"
      description: "Per-product Postgres role/slug (PROD_TENANT_SLUG); managed-password tenant ensured idempotently each deploy. Defaults to PROD_SLUG, published by product_instance."
    db_url_scheme:
      default: "ecto"
      description: "Scheme for the assembled DATABASE_URL (DB_URL_SCHEME); ecto for Phoenix."
    migrate_cmd:
      default: "bin/$PROD_SLUG eval '$PROD_RELEASE_MODULE.Release.setup'"
      description: "Container migrate command (PROD_MIGRATE_CMD). Defaults to the standard bin/<slug> eval '<release_module>.Release.setup' convention (migrate, then seed only for non-prod deploy profiles), built from PROD_SLUG/PROD_RELEASE_MODULE, published by product_instance."
    namespace:
      default: "$PROD_NAMESPACE"
      description: "Kubernetes namespace the product_instance CronJob runs in. Defaults to PROD_NAMESPACE, published by product_instance."
    cloudflare_account_id:
      default: "$PROD_CLOUDFLARE_ACCOUNT_ID"
      description: "Cloudflare account id for the static-site preview deployer. Defaults to PROD_CLOUDFLARE_ACCOUNT_ID, published by product_instance with a wildcard environment_scope (readable from this pipeline-level rule); empty skips preview-pages-deploy entirely."
    tofu_chdirs:
      type: array
      default: ["."]
      description: "Directories of the Terraform/OpenTofu root(s) to fmt-check/validate/test."
---

include:
  - local: /templates/product-ops.yml
    inputs:
      chdir: $[[ inputs.chdir ]]
      secrets_file: $[[ inputs.secrets_file ]]
      app_name: $[[ inputs.app_name ]]
      app_service: $[[ inputs.app_service ]]
      app_image: $[[ inputs.app_image ]]
      app_host: $[[ inputs.app_host ]]
      app_port: $[[ inputs.app_port ]]
      app_release_module: $[[ inputs.app_release_module ]]
      migrate_cmd: $[[ inputs.migrate_cmd ]]
      tenant_slug: $[[ inputs.tenant_slug ]]
      db_url_scheme: $[[ inputs.db_url_scheme ]]
      namespace: $[[ inputs.namespace ]]
  - local: /templates/preview-dispatch.yml
  - local: /templates/preview-pages-deploy.yml
    rules:
      - if: '"$[[ inputs.cloudflare_account_id ]]" != ""'
    inputs:
      account_id: $[[ inputs.cloudflare_account_id ]]
      preview_stage: preview
  - local: /templates/tofu-test.yml
    inputs:
      chdirs: $[[ inputs.tofu_chdirs ]]
      stage: lint
  - local: /templates/tofu-coverage.yml
    inputs:
      stage: lint
  - local: /templates/coverage-gate.yml
    inputs:
      test_job_name: tofu-coverage
      stage: lint

stages:
  - lint
  - plan
  - apply
  - tenant
  - deploy
  - backup
  - restore
  - drill
  - verify
  - preview
  - drift

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "production"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $PREVIEW_ACTION
    - if: $PROD_ACTION == "deploy"
    - if: $CI_PIPELINE_SOURCE == "web" && $PROD_TAG
