spec:
  inputs:
    chdir:
      default: "."
      description: "Directory of the Terraform root module."
    secrets_file:
      default: "secrets.enc.env"
      description: "SOPS-encrypted env file decrypted into the job environment."
    app_name:
      default: "$PROD_SLUG"
      description: "Product slug; the restore drill's backup object prefix (PROD_BACKUP_NAME). Defaults to PROD_SLUG, published by product_instance."
    app_service:
      description: "kamal service name (APP_SERVICE)."
    app_image:
      description: "Image repository path (APP_IMAGE)."
    app_host:
      default: "$PROD_APP_HOST"
      description: "Public app host (APP_HOST). Defaults to PROD_APP_HOST, published by product_instance; override only for products not on that module."
    app_port:
      default: "4000"
      description: "Container port the app listens on (APP_PORT)."
    app_release_module:
      default: "$PROD_RELEASE_MODULE"
      description: "Elixir release module for the post-deploy migrate hook (APP_RELEASE_MODULE.Release.migrate). Defaults to PROD_RELEASE_MODULE, published by product_instance."
    tenant_slug:
      default: "$PROD_SLUG"
      description: "Per-product Postgres role/slug (PROD_TENANT_SLUG); managed-password tenant ensured idempotently each deploy. Defaults to PROD_SLUG, published by product_instance."
    db_url_scheme:
      default: "ecto"
      description: "Scheme for the assembled DATABASE_URL (DB_URL_SCHEME)."
    runtime:
      default: "kamal"
      options: ["kamal", "k3s"]
      description: "Prod deploy runtime (kamal|k3s); passed to prod-deploy. Default kamal for back-compat."
    migrate_cmd:
      default: "bin/migrate"
      description: "Container migrate command for the k3s runtime (PROD_MIGRATE_CMD); ignored on kamal."
    namespace:
      default: "$PROD_NAMESPACE"
      description: "Kubernetes namespace the product_instance CronJob runs in; required when runtime is k3s (selects db-backup-run instead of prod-backup). Defaults to PROD_NAMESPACE, published by product_instance."
---

include:
  - local: /templates/ops.yml
    inputs:
      chdir: $[[ inputs.chdir ]]
      secrets_file: $[[ inputs.secrets_file ]]
  - local: /templates/prod-deploy.yml
    inputs:
      runtime: $[[ inputs.runtime ]]
      app_service: $[[ inputs.app_service ]]
      app_image: $[[ inputs.app_image ]]
      app_host: $[[ inputs.app_host ]]
      app_port: $[[ inputs.app_port ]]
      app_release_module: $[[ inputs.app_release_module ]]
      migrate_cmd: $[[ inputs.migrate_cmd ]]
      tenant_slug: $[[ inputs.tenant_slug ]]
      db_url_scheme: $[[ inputs.db_url_scheme ]]
      deploy_stage: deploy
  - local: /templates/prod-backup.yml
    rules:
      - if: '"$[[ inputs.runtime ]]" == "kamal"'
    inputs:
      app_service: $[[ inputs.app_service ]]
      app_image: $[[ inputs.app_image ]]
      app_host: $[[ inputs.app_host ]]
      app_port: $[[ inputs.app_port ]]
      app_release_module: $[[ inputs.app_release_module ]]
      tenant_slug: $[[ inputs.tenant_slug ]]
      db_url_scheme: $[[ inputs.db_url_scheme ]]
      backup_stage: backup
  - local: /templates/db-backup-run.yml
    rules:
      - if: '"$[[ inputs.runtime ]]" == "k3s"'
    inputs:
      app_name: $[[ inputs.app_name ]]
      namespace: $[[ inputs.namespace ]]
      run_stage: backup
  - local: /templates/prod-restore.yml
    inputs:
      app_service: $[[ inputs.app_service ]]
      restore_stage: restore
  - local: /templates/prod-tenant.yml
    inputs:
      tenant_slug: $[[ inputs.tenant_slug ]]
      tenant_stage: tenant
  - local: /templates/db-restore-drill.yml
    inputs:
      app_name: $[[ inputs.app_name ]]
      drill_stage: drill
  - local: /templates/db-backup-verify.yml
    inputs:
      app_name: $[[ inputs.app_name ]]
      verify_stage: verify

stages:
  - lint
  - plan
  - apply
  - tenant
  - deploy
  - backup
  - restore
  - drill
  - verify
  - drift

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "production"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $PROD_ACTION == "deploy"
    - if: $CI_PIPELINE_SOURCE == "web" && $PROD_TAG
