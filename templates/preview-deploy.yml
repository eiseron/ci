spec:
  inputs:
    image_tag:
      default: "v0.1.3"
      description: "public-image-bases python-ansible tag to run the jobs on."
    provisioning_ref:
      default: "v0.8.0"
      description: "eiseron.provisioning collection tag to install and run."
    app_name:
      default: "app"
      description: "Product slug; the deploy is named <app_name>-mr-<iid><preview_suffix>."
    app_port:
      default: "4000"
      description: "Container port the app listens on."
    preview_zone:
      description: "DNS zone for previews; the app is served at <app_name>-mr-<iid><preview_suffix>.<preview_zone>, which must be covered by the host's wildcard certificate."
    preview_suffix:
      default: ""
      description: "Suffix appended to the slug before the zone, e.g. -preview to serve <slug>-preview.<zone>."
    db_host:
      default: "shared-pg"
      description: "Hostname of the shared Postgres on the host's docker network."
    db_port:
      default: "5432"
      description: "Port of the shared Postgres."
    db_url_scheme:
      default: "postgresql"
      description: "URL scheme for the assembled DATABASE_URL (e.g. ecto for Phoenix)."
    deploy_stage:
      default: "deploy"
      description: "Pipeline stage for the deploy job (the consumer must declare it)."
    stop_stage:
      default: "deploy"
      description: "Pipeline stage for the stop job (the consumer must declare it)."
---
.eiseron-preview-base:
  image:
    name: registry.gitlab.com/eiseron/stack/public-image-bases/python-ansible:$[[ inputs.image_tag ]]
  tags:
    - self-hosted
  cache: []
  variables:
    GIT_STRATEGY: none
    ANSIBLE_HOST_KEY_CHECKING: "False"
    ANSIBLE_PRIVATE_KEY_FILE: "$CI_PROJECT_DIR/preview_key"
    PREVIEW_APP_NAME: "$[[ inputs.app_name ]]-mr-${PREVIEW_MR_IID}$[[ inputs.preview_suffix ]]"
    PREVIEW_APP_HOST: "${PREVIEW_APP_NAME}.$[[ inputs.preview_zone ]]"
    PREVIEW_APP_PORT: "$[[ inputs.app_port ]]"
    PREVIEW_APP_DB_NAME: "${PREVIEW_TENANT_NAME}_mr${PREVIEW_MR_IID}"
  before_script:
    - install -d -m 700 "$CI_PROJECT_DIR"
    - printf '%s\n' "$PREVIEW_ANSIBLE_SSH_PRIVATE_KEY" > "$CI_PROJECT_DIR/preview_key"
    - chmod 600 "$CI_PROJECT_DIR/preview_key"
    - ansible-galaxy collection install "git+https://gitlab.com/eiseron/stack/provisioning.git,$[[ inputs.provisioning_ref ]]" --force
    - PREVIEW_TENANT_PASSWORD_ENC="$(python3 -c 'import os,urllib.parse as u; print(u.quote(os.environ.get("PREVIEW_TENANT_PASSWORD",""), safe=""))')"
    - export DATABASE_URL="$[[ inputs.db_url_scheme ]]://${PREVIEW_TENANT_NAME}:${PREVIEW_TENANT_PASSWORD_ENC}@$[[ inputs.db_host ]]:$[[ inputs.db_port ]]/${PREVIEW_APP_DB_NAME}"
    - export PREVIEW_APP_ENV="$(python3 -c 'import json,os; print(json.dumps({"DATABASE_URL": os.environ["DATABASE_URL"], **json.loads(os.environ.get("PREVIEW_APP_EXTRA_ENV") or "{}")}))')"
  script:
    - ansible-playbook -i "$PREVIEW_HOST_IP," eiseron.provisioning.preview_app

preview-deploy:
  extends: .eiseron-preview-base
  stage: $[[ inputs.deploy_stage ]]
  variables:
    PREVIEW_APP_STATE: present
  environment:
    name: preview/$PREVIEW_MR_IID
    url: https://${PREVIEW_APP_NAME}.$[[ inputs.preview_zone ]]
  resource_group: preview/$PREVIEW_MR_IID
  rules:
    - if: '$PREVIEW_MR_IID && $PREVIEW_ACTION == "deploy"'

preview-stop:
  extends: .eiseron-preview-base
  stage: $[[ inputs.stop_stage ]]
  variables:
    PREVIEW_APP_STATE: absent
  environment:
    name: preview/$PREVIEW_MR_IID
    action: stop
  resource_group: preview/$PREVIEW_MR_IID
  rules:
    - if: '$PREVIEW_MR_IID && $PREVIEW_ACTION == "stop"'
