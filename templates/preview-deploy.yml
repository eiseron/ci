spec:
  inputs:
    image_tag:
      default: "v0.1.6"
      description: "public-image-bases python-ansible tag (carries ruby + ansible)."
    automation_ref:
      default: "v0.2.0"
      description: "eiseron/stack/automation tag providing the eiseron CLI."
    provisioning_ref:
      default: "v0.8.0"
      description: "eiseron.provisioning collection tag the playbook runs from."
    app_name:
      default: "app"
      description: "Product slug; the deploy is named <app_name>-mr-<iid><preview_suffix>."
    app_port:
      default: "4000"
      description: "Container port the app listens on."
    preview_zone:
      description: "DNS zone for previews; served at <app_name>-mr-<iid><preview_suffix>.<preview_zone>."
    preview_suffix:
      default: ""
      description: "Suffix appended to the slug before the zone, e.g. -preview."
    db_host:
      default: "shared-pg"
      description: "Shared Postgres hostname on the host's docker network."
    db_port:
      default: "5432"
      description: "Shared Postgres port."
    db_url_scheme:
      default: "postgresql"
      description: "Scheme for the assembled DATABASE_URL (e.g. ecto)."
    deploy_stage:
      default: "deploy"
      description: "Pipeline stage for the deploy job (the consumer must declare it)."
    stop_stage:
      default: "deploy"
      description: "Pipeline stage for the stop job (the consumer must declare it)."
---
.eiseron-preview-base:
  image:
    name: registry.gitlab.com/eiseron/stack/public-image-bases/python-ansible:$[[ inputs.image_tag ]]
  tags:
    - self-hosted
  cache: []
  variables:
    GIT_STRATEGY: none
    ANSIBLE_HOST_KEY_CHECKING: "False"
    ANSIBLE_PRIVATE_KEY_FILE: "$CI_PROJECT_DIR/preview_key"
    EISERON_PREVIEW_APP: "$[[ inputs.app_name ]]"
    EISERON_PREVIEW_SUFFIX: "$[[ inputs.preview_suffix ]]"
    EISERON_PREVIEW_ZONE: "$[[ inputs.preview_zone ]]"
    EISERON_PREVIEW_PORT: "$[[ inputs.app_port ]]"
    EISERON_PREVIEW_DB_SCHEME: "$[[ inputs.db_url_scheme ]]"
    EISERON_PREVIEW_DB_HOST: "$[[ inputs.db_host ]]"
    EISERON_PREVIEW_DB_PORT: "$[[ inputs.db_port ]]"
  before_script:
    - install -d -m 700 "$CI_PROJECT_DIR"
    - cp "$PREVIEW_ANSIBLE_SSH_PRIVATE_KEY" "$CI_PROJECT_DIR/preview_key"
    - chmod 600 "$CI_PROJECT_DIR/preview_key"
    - gem install specific_install --no-document
    - gem specific_install https://gitlab.com/eiseron/stack/automation.git -b "$[[ inputs.automation_ref ]]"
    - ansible-galaxy collection install "git+https://gitlab.com/eiseron/stack/provisioning.git,$[[ inputs.provisioning_ref ]]" --force

preview-deploy:
  extends: .eiseron-preview-base
  stage: $[[ inputs.deploy_stage ]]
  environment:
    name: production
  resource_group: preview/$PREVIEW_MR_IID
  script:
    - eiseron preview deploy
  rules:
    - if: '$PREVIEW_MR_IID && $PREVIEW_ACTION == "deploy"'

preview-stop:
  extends: .eiseron-preview-base
  stage: $[[ inputs.stop_stage ]]
  environment:
    name: production
  resource_group: preview/$PREVIEW_MR_IID
  script:
    - eiseron preview stop
  rules:
    - if: '$PREVIEW_MR_IID && $PREVIEW_ACTION == "stop"'
