spec:
  inputs:
    chdirs:
      type: array
      description: "Directories of the Terraform/OpenTofu modules to test, one job per entry."
    stage:
      default: "test"
      description: "Pipeline stage for the job (consumer must declare it)."
---
include:
  - local: /lock.yml

tofu-test:
  stage: $[[ inputs.stage ]]
  image:
    name: $STACK_IAC_IMAGE
    entrypoint: [""]
  tags:
    - self-hosted
  cache: []
  before_script: []
  parallel:
    matrix:
      - CHDIR: $[[ inputs.chdirs ]]
  script:
    - tofu -chdir="$CHDIR" init -backend=false -input=false
    - tofu -chdir="$CHDIR" test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
