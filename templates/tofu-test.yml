spec:
  inputs:
    matrix:
      type: array
      description: "One entry per module: {CHDIR: directory to run tofu in, WATCH: directory whose changes should trigger the job}."
    stage:
      default: "test"
      description: "Pipeline stage for the job (consumer must declare it)."
---
include:
  - local: /lock.yml

tofu-test:
  stage: $[[ inputs.stage ]]
  image:
    name: $STACK_IAC_IMAGE
    entrypoint: [""]
  tags:
    - self-hosted
  cache: []
  before_script: []
  parallel:
    matrix: $[[ inputs.matrix ]]
  script:
    - tofu -chdir="$CHDIR" init -backend=false -input=false
    - tofu -chdir="$CHDIR" test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - $WATCH/**/*
