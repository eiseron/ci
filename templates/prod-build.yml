# Production build, on a product repo, driven by a semver tag.
#
# On a `vX.Y.Z` tag this compiles the Phoenix assets once, builds the release
# image with kaniko, uploads the digested assets to Cloudflare R2 (served at the
# CDN host) with sourcemaps to a private bucket, then triggers the product's -ops
# repo to deploy the pre-built image. Assets land in two places from one compile:
# the image (Dockerfile.prod COPYs priv/static, never re-digests) and the CDN.
#
# The upload and trigger steps are `eiseron prod upload` / `eiseron prod trigger`
# from the automation gem (tested logic, dormant-skip when creds are unset).
#
# Usage in a consumer .gitlab-ci.yml:
#   include:
#     - project: eiseron/stack/ci
#       file: /templates/prod-build.yml
#       ref: vX.Y.Z
#       inputs:
#         app_name: afinados
#         assets_bucket: afinados-assets
#         sourcemaps_bucket: afinados-sourcemaps
#   stages: [build, upload, deploy]
#
# CI vars the consumer must provide (Terraform-managed in <product>-ops):
#   CLOUDFLARE_ACCOUNT_ID                      builds the R2 S3 endpoint
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY  R2 token scoped to the buckets
#   PROD_DEPLOYER_PROJECT                      the -ops project path
#   PROD_DEPLOYER_TRIGGER_TOKEN                pipeline trigger token for -ops
spec:
  inputs:
    image_tag:
      default: "v0.1.15"
      description: "public-image-bases tag: elixir-builder (build) + python-ansible (upload/trigger, carries ruby)."
    automation_ref:
      default: "v0.8.0"
      description: "eiseron/stack/automation tag providing `eiseron prod upload` and `prod trigger`."
    app_name:
      default: "app"
      description: "Product slug; used for logging and the deploy environment."
    dockerfile:
      default: ".docker/Dockerfile.prod"
      description: "Path to the production release Dockerfile, built with kaniko."
    assets_dir:
      default: "priv/static"
      description: "Digested static root (mix assets.deploy output) synced to the CDN; Phoenix static_url is global so the whole tree (assets, images, fonts) must be served from the CDN."
    assets_bucket:
      description: "R2 bucket served at the CDN host (public assets; excludes *.map)."
    sourcemaps_bucket:
      description: "R2 bucket for sourcemaps (private; only *.map)."
    build_stage:
      default: "build"
      description: "Stage for the image build job (the consumer must declare it)."
    upload_stage:
      default: "upload"
      description: "Stage for the asset upload job."
    trigger_stage:
      default: "deploy"
      description: "Stage for the -ops trigger job."
---
.eiseron-prod-tag:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

.eiseron-prod-gem:
  image:
    name: registry.gitlab.com/eiseron/stack/public-image-bases/python-ansible:$[[ inputs.image_tag ]]
  tags:
    - self-hosted
  variables:
    GIT_STRATEGY: none
  before_script:
    - gem install specific_install --no-document
    - gem specific_install https://gitlab.com/eiseron/stack/automation.git -b "$[[ inputs.automation_ref ]]"

prod-build:
  extends: .eiseron-prod-tag
  stage: $[[ inputs.build_stage ]]
  image:
    name: registry.gitlab.com/eiseron/stack/public-image-bases/elixir-builder:$[[ inputs.image_tag ]]
  tags:
    - self-hosted
  variables:
    MIX_ENV: prod
    DOCKER_CONFIG: "/kaniko/.docker"
  cache:
    - key:
        prefix: "prod-deps"
        files:
          - mix.lock
      paths:
        - deps/
    - key:
        prefix: "prod-build"
        files:
          - mix.lock
      paths:
        - _build/prod/
  script:
    - mix deps.get --only prod
    - mix deps.compile
    - mix assets.deploy
    - cp "$[[ inputs.dockerfile ]]" Dockerfile
    - AUTH_B64=$(printf 'gitlab-ci-token:%s' "$CI_JOB_TOKEN" | base64 | tr -d '\n')
    - mkdir -p "$DOCKER_CONFIG"
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$AUTH_B64\"}}}" > "$DOCKER_CONFIG/config.json"
    - >
      executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE/prod:$CI_COMMIT_TAG"
      --destination "$CI_REGISTRY_IMAGE/prod:latest"
      --cache=true
      --cache-repo="$CI_REGISTRY_IMAGE/kaniko-cache"
      --cache-ttl=168h
      --push-retry=3
  artifacts:
    paths:
      - $[[ inputs.assets_dir ]]
    expire_in: 1 day

prod-assets-upload:
  extends:
    - .eiseron-prod-gem
    - .eiseron-prod-tag
  stage: $[[ inputs.upload_stage ]]
  needs:
    - job: prod-build
      artifacts: true
  variables:
    PROD_ASSETS_DIR: $[[ inputs.assets_dir ]]
    PROD_ASSETS_BUCKET: $[[ inputs.assets_bucket ]]
    PROD_SOURCEMAPS_BUCKET: $[[ inputs.sourcemaps_bucket ]]
  before_script:
    - gem install specific_install --no-document
    - gem specific_install https://gitlab.com/eiseron/stack/automation.git -b "$[[ inputs.automation_ref ]]"
    - gem install aws-sdk-s3 -v "~> 1.215" --no-document
  script:
    - eiseron prod upload

prod-trigger:
  extends:
    - .eiseron-prod-gem
    - .eiseron-prod-tag
  stage: $[[ inputs.trigger_stage ]]
  needs:
    - job: prod-build
      artifacts: false
    - job: prod-assets-upload
      artifacts: false
  script:
    - eiseron prod trigger
